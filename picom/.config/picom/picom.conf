# Opasity
opacity-rule = [
     "90:class_g = 'Alacritty' && focused",
     "70:class_g = 'Alacritty' && !focused",
     "90:class_g = 'XTerm' && focused",
     "70:class_g = 'XTerm' && !focused",
];


# Blur
blur: {
   method    = "dual_kawase"
   strength  = 3;
}


frame-opacity=1;


# GLX backend
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage=true;
glx-no-rebind-pixmap = true;


# Shadows
shadow = true;
shadow-radius = 1;
shadow-offset-x = 1;
shadow-offset-y = 1;
shadow-opacity = 0.3;
shadow-ignore-shaped = false;
